<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUI Boekingsformulier</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <H1>Boekingsformulier</H1>
    <img class="Logo" src="Logo/5a32a854cb9a85480a628f94.png" alt="Tui Logo">
    <br>
    <br>
    <br>
    <br>
    <br>
<nav class="border">
   <form action="/action_page.php">
    <label for="fname">First name:</label>
    <input type="text" id="fname" name="fname"><br><br> 

    <label for="lname">Last name:</label>
    <input type="text" id="lname" name="lname"><br><br>

    <label for="gender">Gender:</label>
    <label for="Male">Male</label>
    <input type="radio" id="Gender" name="gender">
    <label for="Male">Female</label>
    <input type="radio" id="Gender" name="gender"><br><br>

    <label for="Street name + Nr">Street name + nr</label>
    <input type="text" id="Street name + nr" name="Street name + nr"><br><br>

    <label for="Postcode">Postcode:</label>
    <input type="text" name="Postcode" id="Postcode"><br><br>

    <label for="City">City:</label>
    <input type="text" name="City" id="City"><br><br>

    <label for="Country">Country:</label>
    <input type="text" name="Country" id="Country"><br><br>

    <label for="BSN">BSN number:</label>
    <input type="text" name="BSN" id="BSN" maxlength="9"><br><br>

    <label for="Vacation">Countries to travel:</label>
    <select name="Countries" id="Countries">
        <option value="Japan">Japan</option>
        <option value="China">China</option>
        <option value="South Korea">South Korea</option>
        <option value="Malaysia">Malaysia</option>
        <option value="Taiwan">Taiwan</option>
        <option value="philippines">philippines</option>
    </select> <br><br>

    <label for="Date">Date of departure:</label>
    <input type="date" id="Date" name="Date" min="2022-09-14" max="2050-01-01">
    <label class="departure" for="Date">Date of arrival:</label>
    <input type="date" id="Date" name="Date" min="2022-09-16" max="2050-01-01">
<br>
<br>
    <label for="Passengers">Passengers</label>
    <select name="Passengers" id="Passengers">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
    </select><br><br>

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email"><br><br>

    <label for="Password">Password</label>
    <input type="password" id="pwd" name="pwd"><br><br>

    <input type="submit" value="Boek nu!">

   </form>
</nav>
    


</body>
</html>
